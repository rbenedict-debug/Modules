<div class="ds-page-content__heading">
  <h1 class="ds-page-content__title">Agent Management</h1>

  <!-- Page-level tabs (ds-tabs) sit in the heading, the canonical page-with-tabs pattern
       (same as the Tickets page). Hidden while the permission-set editor is open, since the
       editor takes over the content area. -->
  @if (!editingSetId()) {
    <div class="ds-tabs" role="tablist" aria-label="Agent management sections">
      <button class="ds-tabs__tab" role="tab"
              [class.is-selected]="activeTab() === 'agents'"
              [attr.aria-selected]="activeTab() === 'agents'"
              [attr.tabindex]="activeTab() === 'agents' ? 0 : -1"
              (click)="setTab('agents')">Agents</button>
      <button class="ds-tabs__tab" role="tab"
              [class.is-selected]="activeTab() === 'authentication'"
              [attr.aria-selected]="activeTab() === 'authentication'"
              [attr.tabindex]="activeTab() === 'authentication' ? 0 : -1"
              (click)="setTab('authentication')">Authentication</button>
      <button class="ds-tabs__tab" role="tab"
              [class.is-selected]="activeTab() === 'teams'"
              [attr.aria-selected]="activeTab() === 'teams'"
              [attr.tabindex]="activeTab() === 'teams' ? 0 : -1"
              (click)="setTab('teams')">Teams</button>
      <button class="ds-tabs__tab" role="tab"
              [class.is-selected]="activeTab() === 'permission-sets'"
              [attr.aria-selected]="activeTab() === 'permission-sets'"
              [attr.tabindex]="activeTab() === 'permission-sets' ? 0 : -1"
              (click)="setTab('permission-sets')">Permission Sets</button>
    </div>
  }
</div>

<!-- Editor and tabs are mutually exclusive: when a permission set is being edited it takes
     over the content area (reactive — the parent is NOT detached). Otherwise the active
     tab's Onflo table renders. Rendering one table at a time keeps table-init.js's global
     ids from colliding. -->
@if (editingSetId(); as setId) {
  <app-permission-set-editor [setId]="setId" (back)="editingSetId.set(null)" />
} @else {
  @switch (activeTab()) {
    @case ('agents') {
      <app-agents-tab (viewProfile)="openProfile($event)" />
    }
    @case ('authentication') {
      <app-authentication-tab />
    }
    @case ('teams') {
      <app-teams-tab />
    }
    @case ('permission-sets') {
      <app-permission-sets-tab (editSet)="editingSetId.set($event)" />
    }
  }
}
