<!-- Permission-set editor. Rendered full-area by the Agent Management page when editingSetId is
     set. Header + 4-tab bar + read-only banner; tabs read/write PermissionEditorStateService. -->
<div class="psets-editor">
  <!-- The header (back + set name + actions) lives in the page heading now
       (agent-management.component) — this card is just the 4-tab editor.

       The read-only notice ("system set, cannot be edited") is NOT rendered here: a banner
       at the shell level sits outside each tab's scroll region, so it stays pinned while the
       content scrolls. Instead each scrollable tab (Data Visibility / Actions / Settings)
       renders the banner as the first item INSIDE its own scroller, so it scrolls with the
       content. Details intentionally has no banner — that tab lets you assign users/teams. -->

  <div class="psets-editor__tab-body">
    @switch (activeTab()) {
      @case ('details') {
        <app-pset-details-tab />
      }
      @case ('data-visibility') {
        <app-pset-data-visibility-tab />
      }
      @case ('actions') {
        <app-pset-matrix-tab [sections]="actionsSections" />
      }
      @case ('settings') {
        <app-pset-matrix-tab [sections]="settingsSections()" />
      }
    }
  </div>
</div>
