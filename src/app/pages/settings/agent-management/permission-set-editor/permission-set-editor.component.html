<!-- Permission-set editor. Rendered full-area by the Agent Management page when editingSetId is
     set. Header + 4-tab bar + read-only banner; tabs read/write PermissionEditorStateService. -->
<div class="psets-editor">
  <!-- The header (back + set name + actions) lives in the page heading now
       (agent-management.component) — this card is just the read-only notice + the 4-tab editor. -->

  <!-- Banner is hidden on Details — that tab lets you assign users/teams, so a "cannot be
       edited" notice would contradict it. It stays on the read-only Data Visibility / Actions /
       Settings tabs. -->
  @if (state.readOnly() && activeTab() !== 'details') {
    <div class="ds-alert ds-alert--warning psets-editor__notice" role="status">
      <div class="ds-alert__header">
        <span class="ds-icon ds-alert__icon" aria-hidden="true">lock</span>
        <div class="ds-alert__content">
          <div class="ds-alert__text">
            <p class="ds-alert__message">This is a system permission set and cannot be edited.</p>
          </div>
        </div>
      </div>
    </div>
  }

  <div class="psets-editor__tab-body">
    @switch (activeTab()) {
      @case ('details') {
        <app-pset-details-tab />
      }
      @case ('data-visibility') {
        <app-pset-data-visibility-tab />
      }
      @case ('actions') {
        <app-pset-matrix-tab [sections]="actionsSections" />
      }
      @case ('settings') {
        <app-pset-matrix-tab [sections]="settingsSections" />
      }
    }
  </div>
</div>
