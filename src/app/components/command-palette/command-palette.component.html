@if (open()) {
  <div class="cmdk" role="dialog" aria-modal="true" aria-label="Switch persona">
    <div class="cmdk__scrim" (click)="close()"></div>

    <div #panel class="cmdk__panel" tabindex="-1">
      <div class="cmdk__header">
        <span class="ds-icon ds-icon--sm cmdk__header-icon" aria-hidden="true">badge</span>
        <span class="cmdk__title">Switch persona</span>
        <span class="cmdk__kbd" aria-hidden="true">{{ shortcutLabel }}</span>
      </div>

      <div class="cmdk__list" role="listbox" aria-label="Personas">
        @for (p of personas(); track p.id; let i = $index) {
          <button class="cmdk__item" type="button"
                  role="option" [attr.aria-selected]="i === highlighted()"
                  [class.is-highlighted]="i === highlighted()"
                  (mouseenter)="highlighted.set(i)"
                  (click)="selectPersona(p)">
            <span class="cmdk__avatar" aria-hidden="true">{{ initials(p) }}</span>
            <span class="cmdk__text">
              <span class="cmdk__name">{{ p.name }}</span>
              <span class="cmdk__meta">{{ p.title }} · {{ accessSummary(p) }}</span>
            </span>
            @if (p.id === currentId()) {
              <span class="ds-label ds-label--pill ds-label--xs ds-label--green cmdk__current">Viewing</span>
            }
          </button>
        }
      </div>

      <div class="cmdk__footer">
        <span class="cmdk__footer-hint"><span class="cmdk__kbd">↑</span><span class="cmdk__kbd">↓</span> navigate</span>
        <span class="cmdk__footer-hint"><span class="cmdk__kbd">↵</span> select</span>
        <span class="cmdk__footer-hint"><span class="cmdk__kbd">esc</span> close</span>
      </div>
    </div>
  </div>
}
