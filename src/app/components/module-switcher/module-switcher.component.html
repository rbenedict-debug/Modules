<div class="module-switcher">
  <!-- Trigger: shows the current context (accent module icon + name, or globe + "Global") -->
  <button class="module-switcher__trigger" type="button"
          aria-haspopup="menu" [attr.aria-expanded]="open()"
          aria-label="Switch module context"
          (click)="toggle()">
    @if (moduleCtx.isGlobal()) {
      <span class="ds-icon ds-icon--sm ds-icon--filled module-switcher__icon module-switcher__icon--global" aria-hidden="true">public</span>
      <span class="module-switcher__name">Global</span>
    } @else {
      <span class="ds-icon ds-icon--sm ds-icon--filled module-switcher__icon module-switcher__accent--{{ currentColorClass() }}"
            aria-hidden="true">{{ moduleCtx.currentModule()?.icon }}</span>
      <span class="module-switcher__name">{{ moduleCtx.currentModule()?.name }}</span>
    }
    <span class="ds-icon ds-icon--sm module-switcher__caret" aria-hidden="true">
      {{ open() ? 'arrow_drop_up' : 'arrow_drop_down' }}
    </span>
  </button>

  @if (open()) {
    <!-- Surface IS the real ds-menu (genuine menu color, border treatment, radius, elevation-3) — matches every other menu.
         Rows are ds-list-item--2-lines (interactive) placed directly in the menu: the DS-sanctioned 2-line row inside a menu.
         No ds-list wrapper — that container is what added the second border earlier. -->
    <div class="ds-menu module-switcher__panel" role="menu" aria-label="Module context">
      <!-- Global (district-wide) — only a global-admin persona can reach it; kept so they can return to the all-departments view. -->
      @if (moduleCtx.isGlobalAdmin()) {
        <div class="ds-list-item ds-list-item--2-lines ds-list-item--interactive"
             role="menuitemradio" [attr.aria-checked]="moduleCtx.isGlobal()" tabindex="0"
             (click)="select(null, $event)"
             (keydown.enter)="select(null, $event)"
             (keydown.space)="select(null, $event); $event.preventDefault()">
          <div class="ds-list-item__leading">
            <span class="ds-icon ds-icon--filled module-switcher__icon--global" aria-hidden="true">public</span>
          </div>
          <div class="ds-list-item__content">
            <span class="ds-list-item__primary">Global</span>
            <span class="ds-list-item__secondary">All departments</span>
          </div>
          @if (moduleCtx.isGlobal()) {
            <div class="ds-list-item__trailing">
              <span class="ds-icon ds-icon--sm module-switcher__check" aria-hidden="true">check</span>
            </div>
          }
        </div>
      }

      <!-- Department modules the active persona can act in -->
      @for (m of moduleCtx.availableModules(); track m.id) {
        <div class="ds-list-item ds-list-item--2-lines ds-list-item--interactive"
             role="menuitemradio" [attr.aria-checked]="moduleCtx.currentModuleId() === m.id" tabindex="0"
             (click)="select(m.id, $event)"
             (keydown.enter)="select(m.id, $event)"
             (keydown.space)="select(m.id, $event); $event.preventDefault()">
          <div class="ds-list-item__leading">
            <span class="ds-icon ds-icon--filled module-switcher__accent--{{ m.color ?? m.accent }}" aria-hidden="true">{{ m.icon }}</span>
          </div>
          <div class="ds-list-item__content">
            <span class="ds-list-item__primary">{{ m.name }}</span>
            <span class="ds-list-item__secondary">{{ m.role }}</span>
          </div>
          @if (moduleCtx.currentModuleId() === m.id) {
            <div class="ds-list-item__trailing">
              <span class="ds-icon ds-icon--sm module-switcher__check" aria-hidden="true">check</span>
            </div>
          }
        </div>
      }
    </div>
  }
</div>
